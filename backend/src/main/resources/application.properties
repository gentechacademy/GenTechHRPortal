# Application
spring.application.name=HR Portal
server.port=8081

# Profile - Change to 'dev' for cloud DB, 'local' for fast H2 database
spring.profiles.active=dev

# Database (PostgreSQL) - Primary Configuration
spring.datasource.url=jdbc:postgresql://dpg-d6nfja14tr6s73eruodg-a.oregon-postgres.render.com:5432/gentechhrportal
spring.datasource.username=gentechhrportal_user
spring.datasource.password=RRoo0k6jcSw10poTwPUKXf5FZtZSARfH
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP) - Optimized for Cloud DB
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.leak-detection-threshold=60000
# Test connection before using (critical for cloud DB)
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=3000

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Performance Optimizations
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.fetch_size=100
spring.jpa.open-in-view=false

# File Upload
file.upload-dir=uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# JWT
jwt.secret=mySecretKey123456789012345678901234567890
jwt.expiration=86400000

# Logging - Reduced for performance
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.com.gentech.hrportal=INFO

# Server compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css

# Email Configuration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=gentech.academy@gmail.com
spring.mail.password=ibig tpcq cytf lcdz
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Admin and Manager notification emails
